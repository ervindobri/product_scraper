# Product scraper API as a TrueNAS custom app, reachable only over Tailscale.
#
# Install: TrueNAS UI > Apps > Discover > (three-dot menu) > Install via YAML,
# name it "product-scraper" and paste this file. TrueNAS does not read .env
# files here, so fill in the EDIT-ME values inline before pasting.
#
# Before first start, create the datasets (or plain dirs) used below, e.g.:
#   /mnt/<pool>/apps/product-scraper/ts-state
#   /mnt/<pool>/apps/product-scraper/data
#
# The app is served at https://product-scraper.<tailnet>.ts.net — requires
# MagicDNS + HTTPS certificates enabled in the Tailscale admin console.

configs:
  ts-serve:
    # tailscale serve: terminate TLS on 443 and proxy to django (gunicorn :8000)
    # inside the shared network namespace. AllowFunnel=false keeps it
    # tailnet-only. Later the frontend can be added via path routing here.
    content: |
      {
        "TCP": {"443": {"HTTPS": true}},
        "Web": {
          "$${TS_CERT_DOMAIN}:443": {
            "Handlers": {"/": {"Proxy": "http://127.0.0.1:8000"}}
          }
        },
        "AllowFunnel": {"$${TS_CERT_DOMAIN}:443": false}
      }

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: product-scraper-ts
    hostname: product-scraper            # node name -> product-scraper.<tailnet>.ts.net
    environment:
      - TS_AUTHKEY=tskey-auth-EDIT-ME    # https://login.tailscale.com/admin/settings/keys (use a tagged key)
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    configs:
      - source: ts-serve
        target: /config/serve.json
    volumes:
      - /mnt/EDIT-ME/apps/product-scraper/ts-state:/var/lib/tailscale  # node identity must persist
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  api:
    image: ghcr.io/ervindobri/product-scraper:latest
    container_name: product-scraper-api
    network_mode: service:tailscale      # share the sidecar's network; not exposed on the LAN
    environment:
      - DJANGO_DEBUG=0
      - DJANGO_SECRET_KEY=EDIT-ME        # e.g. `openssl rand -base64 48`
      - DJANGO_ALLOWED_HOSTS=product-scraper.EDIT-ME.ts.net
      - DJANGO_CSRF_TRUSTED_ORIGINS=https://product-scraper.EDIT-ME.ts.net
      # only needed once a web frontend runs on a *different* origin:
      # - DJANGO_CORS_ALLOWED_ORIGINS=https://frontend.EDIT-ME.ts.net
    volumes:
      - /mnt/EDIT-ME/apps/product-scraper/data:/data   # sqlite database
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped
