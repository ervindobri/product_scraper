# Flutter web bundle behind the tailscale sidecar (shared network namespace).
# 8080 because django/gunicorn already owns 8000.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/wasm image/svg+xml font/ttf;

    # entry points must revalidate so a new release shows up on reload
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
