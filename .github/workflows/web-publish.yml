name: Publish web image

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - Dockerfile.web
      - deploy/nginx-web.conf
      - .github/workflows/web-publish.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable
          cache: true

      - run: flutter pub get
        working-directory: frontend

      - run: flutter build web --release
        working-directory: frontend

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/product-scraper-web:latest
            ghcr.io/${{ github.repository_owner }}/product-scraper-web:${{ github.sha }}
